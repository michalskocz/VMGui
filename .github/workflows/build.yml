name: Build VMGui to Fat JAR


on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        if: runner.os == 'Linux'
        run: chmod +x ./gradlew

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: ./gradlew test -PskipSvgConvert

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat test -PskipSvgConvert

      - name: Build shadowJar (Linux)
        if: runner.os == 'Linux' && success()
        run: ./gradlew clean shadowJar

      - name: Build shadowJar (Windows)
        if: runner.os == 'Windows' && success()
        run: .\gradlew.bat clean shadowJar

      - name: Pack artifact (Linux)
        if: runner.os == 'Linux' && success()
        run: |
          cd build/libs
          jar_name=$(ls *.jar | head -n 1)
          zip "VMGui-${{ runner.os }}.zip" "$jar_name"

      - name: Pack artifact (Windows)
        if: runner.os == 'Windows' && success()
        shell: powershell
        run: |
          $jar = Get-ChildItem build/libs/*.jar | Select-Object -First 1
          $dest = Join-Path -Path $PWD -ChildPath "build/libs/VMGui-${{ runner.os }}.zip"
          Compress-Archive -Path $jar.FullName -DestinationPath $dest -Force

      - name: Upload ZIP
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VMGui-${{ runner.os }}
          path: build/libs/VMGui-${{ runner.os }}.zip
          if-no-files-found: error